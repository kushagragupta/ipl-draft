name: Daily IPL Fantasy Points Sync

on:
  schedule:
    # Runs everyday at 18:30 UTC (12:00 AM Indian Standard Time) after IPL matches finish
    - cron: '30 18 * * *'
  # Allows you to trigger the point sync manually from the GitHub Actions UI
  workflow_dispatch:

jobs:
  sync-points:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code Repository
        uses: actions/checkout@v4
        with:
          # Required to push changes back to the repo
          token: ${{ secrets.GITHUB_TOKEN }} 

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install playwright playwright-stealth thefuzz beautifulsoup4 requests pandas lxml
          # Install the headless Chromium browser binary required to bypass Cloudflare
          playwright install chromium 

      - name: Execute Dream11 Points Extraction
        run: |
          # The Python orchestration script that loops through new matches
          python src/scripts/auto_scrape_iplt20.py 

      - name: Commit and Push Updated Points (Triggers Vercel)
        run: |
          # If players.json hasn't changed, this gracefully exits
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data/players.json data/processed_matches.json
          git commit -m "chore(points): automated daily fantasy points sync" || exit 0
          git push
